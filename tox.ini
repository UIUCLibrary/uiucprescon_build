[tox]
envlist = py3{10,11,12,13,14,14t}
isolated_build = true

[testenv]
labels =
    test
commands =  pytest --basetemp={envtmpdir} {env:pytest_args:} {posargs}
pass_env =
    INCLUDE
    LIB
    LIBPATH
    CONAN_USER_HOME

dependency_groups = test

[testenv:mypy]
labels =
    lint
    correctness
dependency_groups = type-checking
skip_install=True
setenv = MYPY_CACHE_DIR = {temp_dir}/.mypy_cache
commands = mypy {posargs: -p uiucprescon.build}

[testenv:flake8]
description = check the code style
dependency_groups = code-style
labels =
    lint
    style
deps =
    flake8
skip_install=True
commands = flake8 {posargs: src}

[testenv:pylint]
labels =
    lint
    style
    correctness
description = check the code style
dependency_groups = lint
skip_install=True
commands =  pylint {posargs: src}

[testenv:pydocstyle]
labels =
    lint
    style
skip_install = true
dependency_groups = code-style
commands =
    pydocstyle {posargs: {toxinidir}/src}

[testenv:bandit]
labels =
    lint
    security
skip_install = true
dependency_groups = security
commands =
    bandit {posargs: -c pyproject.toml --recursive {toxinidir}/src}
